<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>P2P Share</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white w-full max-w-xl p-6 rounded-xl shadow space-y-4">

<h1 class="text-2xl font-bold text-center">P2P File Share</h1>

<div class="text-center text-sm text-gray-500">
Scan QR antar device untuk connect
</div>

<div class="grid grid-cols-2 gap-4">

<button onclick="createOffer()" class="bg-blue-500 text-white p-2 rounded">
Create QR
</button>

<button onclick="startScanner()" class="bg-green-500 text-white p-2 rounded">
Scan QR
</button>

</div>

<div id="qrcode" class="flex justify-center"></div>

<div id="reader" class="hidden"></div>

<div id="dropZone" class="border-2 border-dashed rounded p-6 text-center text-gray-500">
Drop file di sini atau pilih file
<input type="file" id="fileInput" class="mt-2">
</div>

<button onclick="sendFile()" class="w-full bg-black text-white p-2 rounded">
Send File
</button>

<div class="w-full bg-gray-200 rounded h-4">
<div id="progress" class="bg-blue-500 h-4 rounded w-0"></div>
</div>

<div id="status" class="text-center text-sm text-gray-600">
Not connected
</div>

<a id="download" class="hidden text-center text-blue-600 underline block">
Download File
</a>

</div>

<script>

const chunkSize = 16000

let pc = new RTCPeerConnection({
iceServers:[{urls:"stun:stun.l.google.com:19302"}]
})

let channel
let received = []
let receivedSize = 0

pc.ondatachannel=e=>{
channel=e.channel
setupChannel()
}

function setupChannel(){

channel.onopen=()=>status("Connected")

channel.onmessage=e=>{

if(typeof e.data === "string"){
let meta=JSON.parse(e.data)
window.fileMeta=meta
return
}

received.push(e.data)
receivedSize+=e.data.byteLength

updateProgress(receivedSize/window.fileMeta.size*100)

if(receivedSize===window.fileMeta.size){

let blob=new Blob(received)
let url=URL.createObjectURL(blob)

let a=document.getElementById("download")
a.href=url
a.download=window.fileMeta.name
a.classList.remove("hidden")

status("File received")

}

}

}

function status(t){
document.getElementById("status").innerText=t
}

function updateProgress(p){
document.getElementById("progress").style.width=p+"%"
}

async function createOffer(){

channel=pc.createDataChannel("file")
setupChannel()

let offer=await pc.createOffer()
await pc.setLocalDescription(offer)

let data=btoa(JSON.stringify(offer))

document.getElementById("qrcode").innerHTML=""

QRCode.toCanvas(data,{width:200},(err,canvas)=>{
document.getElementById("qrcode").appendChild(canvas)
})

}

async function handleOffer(data){

let offer=JSON.parse(atob(data))

await pc.setRemoteDescription(offer)

let answer=await pc.createAnswer()
await pc.setLocalDescription(answer)

let encoded=btoa(JSON.stringify(answer))

document.getElementById("qrcode").innerHTML=""

QRCode.toCanvas(encoded,{width:200},(err,canvas)=>{
document.getElementById("qrcode").appendChild(canvas)
})

}

async function handleAnswer(data){

let answer=JSON.parse(atob(data))
await pc.setRemoteDescription(answer)

}

function startScanner(){

document.getElementById("reader").classList.remove("hidden")

let scanner=new Html5Qrcode("reader")

scanner.start(
{facingMode:"environment"},
{fps:10,qrbox:250},
msg=>{

scanner.stop()

if(!pc.remoteDescription){
handleOffer(msg)
}else{
handleAnswer(msg)
}

}
)

}

async function sendFile(){

let file=document.getElementById("fileInput").files[0]
if(!file) return

channel.send(JSON.stringify({
name:file.name,
size:file.size
}))

let offset=0

while(offset<file.size){

let slice=file.slice(offset,offset+chunkSize)
let buffer=await slice.arrayBuffer()

channel.send(buffer)

offset+=chunkSize

updateProgress(offset/file.size*100)

}

status("File sent")

}

let drop=document.getElementById("dropZone")

drop.ondragover=e=>{
e.preventDefault()
}

drop.ondrop=e=>{
e.preventDefault()
document.getElementById("fileInput").files=e.dataTransfer.files
}

</script>

</body>
</html>
